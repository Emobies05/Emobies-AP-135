name: emowall
description: Emowall AI 2.0
publish_to: 'none'
version: 1.0.9+109

environment:
  sdk: '^3.6.0'

dependencies:
  google_fonts: ^6.2.1
  flutter:
    sdk: flutter
  intl: ^0.18.1
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
