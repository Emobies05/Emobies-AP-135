name: emowall
description: Emowall AI 2.0
publish_to: 'none'
version: 1.0.10+110

environment:
  sdk: '^3.6.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  intl: ^0.18.1
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  flutter_sound: ^9.2.13
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  sensors_plus: ^5.0.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^6.0.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/ai_alert.mp3
    - assets/sounds/baby_cry.mp3
    - assets/sounds/baby_song.mp3
